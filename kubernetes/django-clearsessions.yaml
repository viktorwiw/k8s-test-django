apiVersion: batch/v1
kind: CronJob
metadata:
  name: job-django-clearsessions
spec:
  schedule: "0 0 1 * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: job-django-clearsessions
            image: nginx-unit-django-app:1.0
            imagePullPolicy: Never
            env:
              - name: SECRET_KEY
                valueFrom:
                  secretKeyRef:
                    name: django-secrets
                    key: SECRET_KEY
              - name: DATABASE_URL
                valueFrom:
                  secretKeyRef:
                    name: django-secrets
                    key: DATABASE_URL
              - name: DEBUG
                valueFrom:
                  secretKeyRef:
                    name: django-secrets
                    key: DEBUG
              - name: ALLOWED_HOSTS
                valueFrom:
                  secretKeyRef:
                    name: django-secrets
                    key: ALLOWED_HOSTS
            command: ['sh', '-c', './manage.py clearsessions']
          restartPolicy: OnFailure